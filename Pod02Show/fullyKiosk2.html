<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Splash Screen</title>
<link rel="prefetch" href="file:///data/user/0/de.ozerov.fully/files/welcome2.html">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: #000;
  cursor: pointer;
}

.splash-container {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.splash-video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  display: block;
}

@media (min-aspect-ratio: 1340/800) {
  .splash-video {
    width: calc(100vh * 1340 / 800);
    height: 100vh;
  }
}

@media (max-aspect-ratio: 1340/800) {
  .splash-video {
    width: 100vw;
    height: calc(100vw * 800 / 1340);
  }
}
</style>
</head>

<body>
<div class="splash-container">
  <video class="splash-video" autoplay loop muted playsinline preload="metadata">
    <source src="file:///storage/emulated/0/DCIM/Video20.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
</div>

<script>
(function() {
  const targetUrl = 'file:///data/user/0/de.ozerov.fully/files/welcome2.html';
  let navigating = false;

  function navigateToTarget(e) {
    if (navigating) return;
    navigating = true;

    if (e && e.type === 'touchstart') {
      e.preventDefault();
    }

    window.location.replace(targetUrl);
  }

  document.addEventListener('touchstart', navigateToTarget, { passive: false });
  document.addEventListener('click', navigateToTarget);

  const video = document.querySelector('.splash-video');
  if (video) {
    video.addEventListener('loadeddata', function() {
      video.play().catch(function(err) {
        console.log('Video autoplay prevented:', err);
      });
    });
  }
})();
</script>

</body>
</html>
