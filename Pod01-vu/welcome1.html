<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Wellness USA</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  height:100%;
  width:100%;
  font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;
  background:#d0d3d5;
  color:#064f72;
  overflow:hidden;
}

body{
  display:flex;
  flex-direction:column;
}

.scene{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2rem;
}

.welcome{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  max-width:520px;
}

.wusa-logo img{
  width:min(42vw,260px);
  height:auto;
  display:block;
  object-fit:contain;
  margin-bottom:2rem;
}

h1{
  font-size:36px;
  font-weight:700;
  letter-spacing:-0.5px;
  color:#064f72;
  margin-bottom:12px;
}

.subtitle{
  font-size:20px;
  line-height:1.45;
  color:#064f72;
  opacity:0.85;
  margin-bottom:2rem;
}

.loader{
  width:36px;
  height:36px;
  border:3px solid rgba(6,79,114,0.2);
  border-top-color:#ce193c;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.footer{
  flex-shrink:0;
  width:100%;
  padding:14px 2rem 20px;
  text-align:center;
  font-size:14px;
  color:#064f72;
  opacity:0.65;
  letter-spacing:0.2px;
}

.footer::before{
  content:"";
  display:block;
  width:80%;
  height:1px;
  margin:0 auto 12px;
  background:linear-gradient(
    90deg,
    transparent 0%,
    rgba(6,79,114,0.12) 15%,
    rgba(6,79,114,0.45) 50%,
    rgba(6,79,114,0.12) 85%,
    transparent 100%
  );
}
</style>
</head>

<body>

<div class="scene">
  <div class="welcome">
    <div class="wusa-logo">
      <img src="WUSA_logo_color.png" alt="Wellness USA">
    </div>
    <h1>Welcome</h1>
    <p class="subtitle">Connecting to your wellness pod&hellip;</p>
    <div class="loader" aria-hidden="true"></div>
  </div>
</div>

<footer class="footer">Wellness USA - Premium Wellness Pod &copy; <span id="year"></span></footer>

<script>
(function() {
  const IP_STORAGE_KEY = "wusa_pod1_ip";
  const errorUrl = "file:///data/user/0/de.ozerov.fully/files/error1.html";
  const resolveTimeoutMs = 3500;

  let resolved = false;

  document.getElementById("year").textContent = new Date().getFullYear();

  function buildPodUrl(ip) {
    return "http://" + ip + ":8080/webvisu.htm";
  }

  function goTo(url) {
    if (resolved) return;
    resolved = true;
    window.location.replace(url);
  }

  function goToPod(url) {
    goTo(url);
  }

  function goToError() {
    goTo(errorUrl);
  }

  const savedIp = localStorage.getItem(IP_STORAGE_KEY);

  if (!savedIp) {
    goToError();
    return;
  }

  const podUrl = buildPodUrl(savedIp);

  const iframe = document.createElement("iframe");
  iframe.setAttribute("aria-hidden", "true");
  iframe.tabIndex = -1;
  iframe.style.cssText = "position:absolute;width:0;height:0;border:0;opacity:0;pointer-events:none";
  iframe.src = podUrl;
  iframe.onload = function() {
    goToPod(podUrl);
  };
  document.body.appendChild(iframe);

  setTimeout(goToError, resolveTimeoutMs);
})();
</script>

</body>
</html>
